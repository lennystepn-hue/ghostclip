name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: cd apps/desktop && pnpm build && pnpm package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: apps/desktop/dist/*

  deploy-server:
    runs-on: ubuntu-latest
    needs: build-desktop
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via Docker
        run: |
          echo "Deploy server and web via docker-compose.prod.yml"
          # ssh deploy@server 'cd /opt/ghostclip && git pull && docker compose -f docker/docker-compose.prod.yml up -d --build'

  create-release:
    runs-on: ubuntu-latest
    needs: [build-desktop, deploy-server]
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: desktop-*/*
          generate_release_notes: true
