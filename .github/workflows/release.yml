name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: cd apps/desktop && pnpm build
      - run: cd apps/desktop && npx electron-builder --linux AppImage deb --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            apps/desktop/release/GhostClip-*.AppImage
            apps/desktop/release/GhostClip-*.deb

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: cd apps/desktop && pnpm build
      - run: cd apps/desktop && npx electron-builder --mac dmg --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: apps/desktop/release/GhostClip-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: cd apps/desktop && pnpm build
      - run: cd apps/desktop && npx electron-builder --win nsis --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: apps/desktop/release/GhostClip-*.exe

  release:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
