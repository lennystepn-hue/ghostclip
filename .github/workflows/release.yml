name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: pnpm --filter @ghostclip/shared build && pnpm --filter @ghostclip/crypto build && pnpm --filter @ghostclip/ai-client build
      - run: cd apps/desktop && pnpm build
      - run: cd apps/desktop && npx electron-builder --linux AppImage deb --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            apps/desktop/release/GhostClip-*.AppImage
            apps/desktop/release/GhostClip-*.deb
            apps/desktop/release/latest-linux.yml

  build-mac:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: pnpm --filter @ghostclip/shared build && pnpm --filter @ghostclip/crypto build && pnpm --filter @ghostclip/ai-client build
      - run: cd apps/desktop && pnpm build
      - name: Build, sign & notarize
        run: cd apps/desktop && npx electron-builder --mac dmg --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        timeout-minutes: 40
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            apps/desktop/release/GhostClip-*.dmg
            apps/desktop/release/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: pnpm --filter @ghostclip/shared build && pnpm --filter @ghostclip/crypto build && pnpm --filter @ghostclip/ai-client build
      - run: cd apps/desktop && pnpm build
      - run: cd apps/desktop && npx electron-builder --win nsis --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            apps/desktop/release/GhostClip-*.exe
            apps/desktop/release/latest.yml

  release:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
