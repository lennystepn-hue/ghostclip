name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.6.2)'
        required: false

permissions:
  contents: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

  build-linux:
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag || github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: pnpm --filter @ghostclip/shared build && pnpm --filter @ghostclip/crypto build && pnpm --filter @ghostclip/ai-client build
      - run: cd apps/desktop && pnpm build
      - run: cd apps/desktop && npx electron-builder --linux AppImage deb --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            apps/desktop/release/GhostClip-*.AppImage
            apps/desktop/release/GhostClip-*.deb
            apps/desktop/release/latest-linux.yml

  build-mac:
    needs: [resolve-tag]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag || github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: pnpm --filter @ghostclip/shared build && pnpm --filter @ghostclip/crypto build && pnpm --filter @ghostclip/ai-client build
      - run: cd apps/desktop && pnpm build
      - name: Build & sign (no notarize)
        run: cd apps/desktop && npx electron-builder --mac dmg zip --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        timeout-minutes: 10
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            apps/desktop/release/GhostClip-*.dmg
            apps/desktop/release/GhostClip-*.zip
            apps/desktop/release/latest-mac.yml

  build-windows:
    needs: [resolve-tag]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag || github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: pnpm --filter @ghostclip/shared build && pnpm --filter @ghostclip/crypto build && pnpm --filter @ghostclip/ai-client build
      - run: cd apps/desktop && pnpm build
      - run: cd apps/desktop && npx electron-builder --win nsis --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            apps/desktop/release/GhostClip-*.exe
            apps/desktop/release/latest.yml

  release:
    needs: [resolve-tag, build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: dist/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
