services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ghostclip-postgres
    environment:
      POSTGRES_USER: ghostclip
      POSTGRES_PASSWORD: ghostclip
      POSTGRES_DB: ghostclip
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ghostclip-redis
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    container_name: ghostclip-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
