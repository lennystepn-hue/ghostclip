events { worker_connections 1024; }

http {
    upstream server { server server:4000; }
    upstream web { server web:3000; }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name ghostclip.com app.ghostclip.com api.ghostclip.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name app.ghostclip.com;

        ssl_certificate /etc/letsencrypt/live/ghostclip.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ghostclip.com/privkey.pem;

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name api.ghostclip.com;

        ssl_certificate /etc/letsencrypt/live/ghostclip.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ghostclip.com/privkey.pem;

        client_max_body_size 10m;

        location /api/auth/ {
            limit_req zone=auth burst=3;
            proxy_pass http://server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            limit_req zone=api burst=20;
            proxy_pass http://server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /socket.io/ {
            proxy_pass http://server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
